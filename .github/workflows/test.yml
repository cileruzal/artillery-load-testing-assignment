name: Cypress E2E Test Automation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # Runs automatically every day at 08:00 UTC
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Execute Cypress Tests
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      # Resmi Cypress Action paketi: Kurulumu, önbelleği ve test koşumunu tek adımda güvenle yapar.
      - name: Run Cypress Automation
        uses: cypress-io/github-action@v5
        
      - name: Archive Cypress test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/**/*.mp4
          retention-days: 1

      - name: Archive Cypress test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/**/*
          retention-days: 1